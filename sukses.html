<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BRImo Ramadhan</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fff;
        }
        img {
            width: 720px;    /* Lebar gambar */
            height: 1328px;  /* Tinggi gambar */
            cursor: pointer;
            display: block;
        }
        /* Responsive untuk layar lebih kecil */
        @media (max-width: 720px) {
            img {
                width: 100vw;
                height: auto;
            }
        }
    </style>
</head>
<body>
    <img 
        src="https://image2url.com/r2/default/images/1773144521028-cb47568e-8e50-497f-af08-1fdab0ff0884.jpeg" 
        alt="BRImo Ramadhan" 
        onclick="window.location.href='';" 
        width="720" height="1328"
    />
</body>
</html>
